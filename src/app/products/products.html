<div class="p-3">
  <div class="card-body">
    <table class="table">
      <thead>
        <tr>
          <th>
            ID
          </th>
          <th>
            Name
          </th>
          <th>
            Price
          </th>
          <th>
            Selected
          </th>
        </tr>
      </thead>
      @if (products) {
      <tbody >
          @for (product of products; track product) {
            <tr>
              <td>{{product.id}}</td>
              <td>{{product.name}}</td>
              <td>{{product.price}}</td>
              <td>{{product.selected}}</td>
            </tr>
          }
      </tbody>
          }
    </table>
  </div>
</div>
